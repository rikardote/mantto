services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mantenimiento_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      TZ: America/Tijuana
    volumes:
      - .:/var/www
    ports:
      - "5176:5173"
      - "8088:8080"
    depends_on:
      - db
    networks:
      - mantenimiento-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: nginx:alpine
    container_name: mantenimiento_web
    restart: unless-stopped
    ports:
      - "8196:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - mantenimiento-net

  db:
    image: mysql:8.0
    container_name: mantenimiento_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mantenimiento
      MYSQL_USER: rishar
      MYSQL_PASSWORD: secretpassword
    ports:
      - "3312:3306"
    volumes:
      - mantenimiento_dbdata:/var/lib/mysql
    networks:
      - mantenimiento-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mantenimiento_pma
    restart: unless-stopped
    ports:
      - "8197:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - mantenimiento-net

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mantenimiento_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - mantenimiento-net

networks:
  mantenimiento-net:
    driver: bridge

volumes:
  mantenimiento_dbdata:
